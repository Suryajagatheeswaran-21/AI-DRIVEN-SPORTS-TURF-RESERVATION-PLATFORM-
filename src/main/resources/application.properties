spring.application.name=sports-turf-platform

# PostgreSQL database connection configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/turfbooking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Port Definition
server.port=${PORT:8080}

# JWT Security Configuration Properties
jwt.secret=${JWT_SECRET:9a2b8c7d6e5f4g3h2i1j0k9l8m7n6o5p4q3r2s1t0u9v8w7x6y5z4a3b2c1d0e}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# Spring AI Google Vertex AI Gemini Integration
spring.ai.google.vertex-ai.gemini.api-key=${GEMINI_API_KEY:}
spring.ai.google.vertex-ai.gemini.project-id=${GOOGLE_CLOUD_PROJECT:}
spring.ai.google.vertex-ai.gemini.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.google.vertex-ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

